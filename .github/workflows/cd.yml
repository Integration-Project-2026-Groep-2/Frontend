name: Build & Deploy Image to Dev

env:
  IMAGE: ghcr.io/integration-project-2026-groep-2/frontend

# Deployt pas NA succesvolle CI — zelfde aanpak als Facturatie en CRM
on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]

jobs:
  build-and-push:
    name: Build & Push Docker image
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Alleen uitvoeren als CI geslaagd is op een push naar main
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          docker build -t ${{ env.IMAGE }}:sha-${SHORT_SHA} .
          docker tag ${{ env.IMAGE }}:sha-${SHORT_SHA} ${{ env.IMAGE }}:latest-dev
          docker push ${{ env.IMAGE }}:sha-${SHORT_SHA}
          docker push ${{ env.IMAGE }}:latest-dev

  deploy-dev:
    name: Deploy naar Dev
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: build-and-push

    steps:
      - name: Deploy to Dev
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEV_HOST }}
          username: ${{ secrets.DEV_USER }}
          key: ${{ secrets.DEV_SSH_KEY }}
          script: ${{ vars.SERVICE_NAME }}
