name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Annuleer vorige runs als er een nieuwe push binnenkomt (zelfde als CRM)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ─────────────────────────────────────────────────────────────
  # JOB 1: Lint & Code Standards
  # Controleert codekwaliteit VOOR de tests draaien
  # ─────────────────────────────────────────────────────────────
  lint:
    name: Lint & Code Standards
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2

      - name: Installeer phpcs en Drupal coder
        run: |
          composer config allow-plugins.dealerdirect/phpcodesniffer-composer-installer true
          composer require --dev \
            "squizlabs/php_codesniffer:^3" \
            "drupal/coder:^8" \
            "slevomat/coding-standard:^8" \
            --no-interaction --no-progress --quiet

      - name: Controleer coding standards (Drupal standaard)
        run: ./vendor/bin/phpcs --standard=phpcs.xml

      - name: Beveiligingsaudit van PHP dependencies
        run: composer audit
        continue-on-error: true

  # ─────────────────────────────────────────────────────────────
  # JOB 2: Unit Tests
  # Draait pas NA lint — verse Drupal installatie via composer
  # ─────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: lint
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          extensions: pdo_sqlite, sqlite3, gd, xml, mbstring, intl

      - name: Cache Composer downloads
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-drupal11-unit-${{ github.run_id }}
          restore-keys: composer-drupal11-

      - name: Maak Drupal testomgeving
        run: |
          composer create-project drupal/recommended-project:^11 /opt/drupal \
            --no-interaction --no-progress --prefer-dist

      - name: Kopieer custom modules
        run: |
          mkdir -p /opt/drupal/web/modules/custom
          cp -r $GITHUB_WORKSPACE/modules/custom/. /opt/drupal/web/modules/custom/

      - name: Kopieer XSD schemas
        run: cp -r $GITHUB_WORKSPACE/xsd /opt/drupal/xsd

      - name: Kopieer phpunit.xml
        run: cp $GITHUB_WORKSPACE/phpunit.xml /opt/drupal/phpunit.xml

      - name: Voer unit tests uit
        working-directory: /opt/drupal
        env:
          XSD_ROOT: /opt/drupal/xsd
        run: |
          ./vendor/bin/phpunit \
            --configuration phpunit.xml \
            --testsuite unit \
            --colors=always \
            --testdox

  # ─────────────────────────────────────────────────────────────
  # JOB 3: Integration Tests
  # Draait parallel met unit-tests NA lint — SQLite kernel tests
  # ─────────────────────────────────────────────────────────────
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: lint
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          extensions: pdo_sqlite, sqlite3, gd, xml, mbstring, intl

      - name: Cache Composer downloads
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-drupal11-integration-${{ github.run_id }}
          restore-keys: composer-drupal11-

      - name: Maak Drupal testomgeving
        run: |
          composer create-project drupal/recommended-project:^11 /opt/drupal \
            --no-interaction --no-progress --prefer-dist

      - name: Kopieer custom modules
        run: |
          mkdir -p /opt/drupal/web/modules/custom
          cp -r $GITHUB_WORKSPACE/modules/custom/. /opt/drupal/web/modules/custom/

      - name: Kopieer phpunit.xml
        run: cp $GITHUB_WORKSPACE/phpunit.xml /opt/drupal/phpunit.xml

      - name: Voer integration tests uit
        working-directory: /opt/drupal
        env:
          SHIFT_BEZOEKER_DISABLE_AMQP: "1"
          SIMPLETEST_DB: "sqlite://localhost//tmp/drupal_ci_test.sqlite"
        run: |
          ./vendor/bin/phpunit \
            --configuration phpunit.xml \
            --testsuite kernel \
            --colors=always \
            --testdox
