name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Annuleer vorige runs als er een nieuwe push binnenkomt (zelfde als CRM)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ─────────────────────────────────────────────────────────────
  # JOB 1: Lint & Code Standards
  # Controleert codekwaliteit VOOR de tests draaien
  # ─────────────────────────────────────────────────────────────
  lint:
    name: Lint & Code Standards
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2

      - name: Installeer phpcs en Drupal coder
        run: |
          composer config allow-plugins.dealerdirect/phpcodesniffer-composer-installer true
          composer require --dev \
            "squizlabs/php_codesniffer:^3" \
            "drupal/coder:^8" \
            "slevomat/coding-standard:^8" \
            --no-interaction --no-progress --quiet

      - name: Controleer coding standards (Drupal standaard)
        run: ./vendor/bin/phpcs --standard=phpcs.xml

      - name: Beveiligingsaudit van PHP dependencies
        run: composer audit
        continue-on-error: true

  # ─────────────────────────────────────────────────────────────
  # JOB 2: Unit Tests
  # Draait pas NA lint — geen database nodig
  # ─────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lint
    permissions:
      contents: read
    container:
      image: drupal:11

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Installeer test-dependencies
        working-directory: /opt/drupal
        run: |
          composer install --no-interaction --no-progress --quiet
          composer require --dev \
            "phpspec/prophecy-phpunit:^2" \
            --no-interaction --no-progress --quiet

      - name: Kopieer custom modules
        run: cp -r $GITHUB_WORKSPACE/modules/custom /opt/drupal/web/modules/custom

      - name: Kopieer XSD schemas
        run: cp -r $GITHUB_WORKSPACE/xsd /opt/drupal/xsd

      - name: Kopieer phpunit.xml en bootstrap
        run: |
          cp $GITHUB_WORKSPACE/phpunit.xml /opt/drupal/phpunit.xml
          cp $GITHUB_WORKSPACE/tests_bootstrap.php /opt/drupal/tests_bootstrap.php

      - name: Voer unit tests uit
        working-directory: /opt/drupal
        env:
          XSD_ROOT: /opt/drupal/xsd
        run: |
          ./vendor/bin/phpunit \
            --configuration phpunit.xml \
            --testsuite unit \
            --colors=always \
            --testdox

  # ─────────────────────────────────────────────────────────────
  # JOB 3: Integration Tests
  # Draait parallel met unit-tests NA lint — gebruikt SQLite
  # ─────────────────────────────────────────────────────────────
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lint
    permissions:
      contents: read
    container:
      image: drupal:11

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Installeer test-dependencies
        working-directory: /opt/drupal
        run: |
          composer install --no-interaction --no-progress --quiet
          composer require --dev \
            "phpspec/prophecy-phpunit:^2" \
            --no-interaction --no-progress --quiet

      - name: Kopieer custom modules
        run: cp -r $GITHUB_WORKSPACE/modules/custom /opt/drupal/web/modules/custom

      - name: Kopieer phpunit.xml en bootstrap
        run: |
          cp $GITHUB_WORKSPACE/phpunit.xml /opt/drupal/phpunit.xml
          cp $GITHUB_WORKSPACE/tests_bootstrap.php /opt/drupal/tests_bootstrap.php

      - name: Voer integration tests uit
        working-directory: /opt/drupal
        env:
          SHIFT_BEZOEKER_DISABLE_AMQP: "1"
          SIMPLETEST_DB: "sqlite://localhost//tmp/drupal_ci_test.sqlite"
        run: |
          ./vendor/bin/phpunit \
            --configuration phpunit.xml \
            --testsuite kernel \
            --colors=always \
            --testdox
