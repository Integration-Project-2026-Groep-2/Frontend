services:
  drupal:
    build: .
    ports:
      - "8080:80"
    environment:
      - DRUPAL_DB_HOST=db
      - DRUPAL_DB_NAME=drupal
      - DRUPAL_DB_USER=drupal
      - DRUPAL_DB_PASSWORD=drupal
    depends_on:
      - db
    entrypoint: >
      bash -c "
        echo 'Waiting for DB...' &&
        until php -r \"new PDO('mysql:host=db;dbname=drupal', 'drupal', 'drupal');\" 2>/dev/null; do
          echo 'DB not ready, retrying...' && sleep 2;
        done &&
        echo 'DB is ready!' &&
        cd /opt/drupal &&
        vendor/bin/drush site:install standard --db-url=mysql://drupal:drupal@db/drupal --site-name='My Drupal Site' --account-name=admin --account-pass=admin --yes --no-interaction &&
        vendor/bin/drush en custom_module --yes &&
        vendor/bin/drush cr &&
        apache2-foreground
      "

  db:
    image: mariadb:11
    environment:
      MARIADB_DATABASE: drupal
      MARIADB_USER: drupal
      MARIADB_PASSWORD: drupal
      MARIADB_ROOT_PASSWORD: root
    volumes:
      - ./db_data:/var/lib/mysql