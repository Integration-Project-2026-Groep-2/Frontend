services:
  drupal:
    image: drupal:11
    ports:
      - "8080:80"
    volumes:
      - drupal_modules:/var/www/html/modules
      - drupal_profiles:/var/www/html/profiles
      - drupal_themes:/var/www/html/themes
      - drupal_sites:/var/www/html/sites
    depends_on:
      - db

  db:
    image: mysql:9.6
    environment:
      MYSQL_DATABASE: drupal
      MYSQL_USER: drupal
      MYSQL_PASSWORD: drupal
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - db_data:/var/lib/mysql

  heartbeat:
    build:
      context: .
      dockerfile: docker/heartbeat/Dockerfile
    volumes:
      - ./rabbitMQ:/scripts
      - heartbeat_vendor:/scripts/vendor
      - ./.env:/scripts/.env:ro
    command: php /scripts/heartbeat.php
    restart: unless-stopped
    
volumes:
  drupal_modules:
  drupal_profiles:
  drupal_themes:
  drupal_sites:
  db_data:
  heartbeat_vendor:
