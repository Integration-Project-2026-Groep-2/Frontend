services:
  rabbitmq:
    image: rabbitmq:4-management
    container_name: rabbitmq_management
    hostname: rabbitmq
    restart: unless-stopped
    ports:
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASS}
      - RABBITMQ_ERLANG_COOKIE=securecookie
    healthcheck:
      test: [ "CMD-SHELL", "rabbitmq-diagnostics -q check_running && rabbitmq-diagnostics -q check_local_alarms" ]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: frontend_drupal
    volumes:
      - drupal_sites:/opt/drupal/web/sites
      - ./modules/custom:/opt/drupal/web/modules/custom:z
      - ./themes/custom:/opt/drupal/web/themes/custom:z
      - ./xsd:/opt/drupal/xsd:ro,z
    restart: unless-stopped
    depends_on:
      frontend_db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "8080:80"
    environment:
      - DRUPAL_DB_HOST=frontend_db
      - DRUPAL_DB_NAME=${FRONTEND_DB_NAME}
      - DRUPAL_DB_USER=${FRONTEND_DB_USER}
      - DRUPAL_DB_PASS=${FRONTEND_DB_PASS}
      - RABBITMQ_HOST=${RABBITMQ_HOST}
      - RABBITMQ_USER=${RABBITMQ_USER}
      - RABBITMQ_PASS=${RABBITMQ_PASS}
      - SKIP_AMQP_CONSUMERS=${SKIP_AMQP_CONSUMERS:-0}
      - ALLOW_AUTO_INSTALL=${ALLOW_AUTO_INSTALL:-0}
      - MCP_MASTER_URL=${MCP_MASTER_URL:-http://mcp-master:8080}
      - MCP_MASTER_BEARER_TOKEN=${MCP_MASTER_BEARER_TOKEN:-}
      - CHAT_JWT_SECRET=${CHAT_JWT_SECRET:-}

  frontend_db:
    image: mariadb:12
    container_name: frontend_db
    restart: unless-stopped
    volumes:
      - frontend_db_data:/var/lib/mysql
    environment:
      MARIADB_DATABASE: ${FRONTEND_DB_NAME}
      MARIADB_USER: ${FRONTEND_DB_USER}
      MARIADB_PASSWORD: ${FRONTEND_DB_PASS}
      MARIADB_ROOT_PASSWORD: ${FRONTEND_DB_ROOT_PASS}
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 10s
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  frontend_db_data:
  drupal_sites:
