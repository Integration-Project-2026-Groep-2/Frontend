name: drupal_dev

services:

  # ── PHP-FPM + Drupal ─────────────────────────────────────────────────────
  drupal:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: dev          # Uses the development stage
    container_name: drupal_app_dev
    restart: unless-stopped
    volumes:
      # Mount your entire project for live code changes
      - .:/var/www/html
      # Persist Drupal public files
      - drupal_files:/var/www/html/web/sites/default/files
      # Persist private files
      - drupal_private:/var/www/html/private
    environment:
      # Drupal database
      DRUPAL_DB_HOST: db
      DRUPAL_DB_PORT: 3306
      DRUPAL_DB_NAME: drupal
      DRUPAL_DB_USER: drupal
      DRUPAL_DB_PASSWORD: drupal
      # RabbitMQ connection (used by settings.php)
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: drupal
      RABBITMQ_PASS: drupal
      RABBITMQ_VHOST: /
      # PHP
      PHP_OPCACHE_ENABLE: 0   # Disable opcache in dev for instant code changes
      XDEBUG_MODE: develop,debug
      XDEBUG_CLIENT_HOST: host.docker.internal
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - drupal_net

  # ── Nginx ─────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: drupal_nginx_dev
    restart: unless-stopped
    ports:
      - "8080:80"      # Access Drupal at http://localhost:8080
    volumes:
      - .:/var/www/html:ro
      - drupal_files:/var/www/html/web/sites/default/files:ro
      - ./frontend/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - drupal
    networks:
      - drupal_net

  # ── MariaDB ───────────────────────────────────────────────────────────────
  db:
    image: mariadb:11.3
    container_name: drupal_db_dev
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: rootpassword
      MARIADB_DATABASE: drupal
      MARIADB_USER: drupal
      MARIADB_PASSWORD: drupal
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - drupal_net

  # ── RabbitMQ ──────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: drupal_rabbitmq_dev
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: drupal
      RABBITMQ_DEFAULT_PASS: drupal
      RABBITMQ_DEFAULT_VHOST: /
    ports:
      - "5672:5672"      # AMQP
      - "15672:15672"    # Management UI → http://localhost:15672
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - drupal_net

  # ── phpMyAdmin (dev convenience) ──────────────────────────────────────────
  phpmyadmin:
    image: phpmyadmin:5.2-apache
    container_name: drupal_pma_dev
    restart: unless-stopped
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      UPLOAD_LIMIT: 128M
    ports:
      - "8081:80"       # Access at http://localhost:8081
    depends_on:
      - db
    networks:
      - drupal_net

volumes:
  db_data:
  rabbitmq_data:
  drupal_files:
  drupal_private:

networks:
  drupal_net:
    driver: bridge
