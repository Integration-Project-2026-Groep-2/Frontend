; ── Production overrides (layered on top of php.ini) ─────────────────────────

[PHP]
; Hide errors from users in production
display_errors = Off
display_startup_errors = Off
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT

; OPcache fully enabled in production
opcache.enable = 1
opcache.enable_cli = 0
opcache.validate_timestamps = 0   ; Don't recheck files on every request
opcache.revalidate_freq = 0

; Tighten memory if needed
memory_limit = 256M
