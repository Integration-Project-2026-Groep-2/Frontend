name: drupal_prod

services:

  # ── PHP-FPM + Drupal ─────────────────────────────────────────────────────
  drupal:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: prod         # Uses the hardened production stage
    image: your-registry/drupal-app:${IMAGE_TAG:-latest}
    container_name: drupal_app
    restart: always
    volumes:
      # Only persist user-uploaded files — code is baked into the image
      - drupal_files:/var/www/html/web/sites/default/files
      - drupal_private:/var/www/html/private
    environment:
      DRUPAL_DB_HOST: db
      DRUPAL_DB_PORT: 3306
      DRUPAL_DB_NAME: ${DB_NAME}
      DRUPAL_DB_USER: ${DB_USER}
      DRUPAL_DB_PASSWORD: ${DB_PASSWORD}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASS: ${RABBITMQ_PASS}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST:-/}
      PHP_OPCACHE_ENABLE: 1
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - drupal_net
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Nginx ─────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: drupal_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - drupal_files:/var/www/html/web/sites/default/files:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      # Mount TLS certificates (e.g. from Certbot / Let's Encrypt)
      - ./docker/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - drupal
    networks:
      - drupal_net

  # ── MariaDB ───────────────────────────────────────────────────────────────
  db:
    image: mariadb:11.3
    container_name: drupal_db
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - drupal_net
    deploy:
      resources:
        limits:
          memory: 512M

  # ── RabbitMQ ──────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: drupal_rabbitmq
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-/}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    # Management UI NOT exposed publicly in prod — use an SSH tunnel if needed
    # ssh -L 15672:localhost:15672 user@your-server
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - drupal_net
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  db_data:
  rabbitmq_data:
  drupal_files:
  drupal_private:

networks:
  drupal_net:
    driver: bridge
