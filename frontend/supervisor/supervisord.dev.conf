; ── Supervisor — Development ──────────────────────────────────────────────────
; Runs both PHP-FPM and the RabbitMQ consumer in one container.

[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid
loglevel=info

; ── PHP-FPM ───────────────────────────────────────────────────────────────────
[program:php-fpm]
command=/usr/local/sbin/php-fpm --nodaemonize
autostart=true
autorestart=true
priority=10
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

; ── RabbitMQ Consumer (Drush daemon) ─────────────────────────────────────────
; Restarts automatically if it crashes.
; In dev: restarts every hour to pick up code changes.
[program:rabbitmq-consumer]
command=/var/www/html/vendor/bin/drush --root=/var/www/html rabbitmq:consume --time-limit=3600
directory=/var/www/html
user=www-data
autostart=true
autorestart=true
priority=20
startretries=5
startsecs=5
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
; Wait for PHP-FPM to be ready before starting the consumer
depends_on=php-fpm
