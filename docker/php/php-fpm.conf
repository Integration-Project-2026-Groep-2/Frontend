; ── PHP-FPM www pool ─────────────────────────────────────────────────────────
[www]
user  = www-data
group = www-data

; Listen on TCP socket (Nginx connects to drupal:9000)
listen = 0.0.0.0:9000

; Process management
pm = dynamic
pm.max_children = 20
pm.start_servers = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 6
pm.max_requests = 500

; Timeouts
request_terminate_timeout = 300

; Logging
access.log = /var/log/php/fpm-access.log
slowlog = /var/log/php/fpm-slow.log
request_slowlog_timeout = 5s

; Pass environment variables through to PHP scripts
clear_env = no
