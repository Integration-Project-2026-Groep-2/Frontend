server {
    listen 80;
    server_name _;

    root /var/www/html/web;
    index index.php;

    # Max upload size (match PHP's upload_max_filesize)
    client_max_body_size 128M;

    # Drupal clean URLs
    location / {
        try_files $uri /index.php?$query_string;
    }

    # Pass PHP requests to PHP-FPM
    location ~ \.php$ {
        fastcgi_pass drupal:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 300;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    # Serve static files directly, don't pass to PHP
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires max;
        log_not_found off;
        access_log off;
    }

    # Deny access to hidden files and sensitive paths
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ ^/sites/.*/private/ {
        return 403;
    }

    location ~ ^/sites/[^/]+/files/.*\.php$ {
        deny all;
    }

    # Drupal's update.php — restrict in production
    location = /update.php {
        fastcgi_pass drupal:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        # Uncomment to restrict to specific IPs in production:
        # allow 1.2.3.4;
        # deny all;
    }

    access_log /var/log/nginx/drupal_access.log;
    error_log  /var/log/nginx/drupal_error.log;
}
