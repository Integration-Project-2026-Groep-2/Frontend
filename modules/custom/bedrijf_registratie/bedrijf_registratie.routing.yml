bedrijf_registratie.programma:
  path: '/programma'
  defaults:
    _controller: '\Drupal\bedrijf_registratie\Controller\PublicController::programmaPagina'
    _title: 'Programma & Sprekers'
  requirements:
    _permission: 'access content'