hello_world.hello:
  path: '/hello'
  defaults:
    _controller: '\Drupal\hello_world\Controller\HelloWorldController::hello'
    _title: 'Hello World'
  requirements:
    _permission: 'access content'

registration_visitor.register:
  path: '/register_visitor'
  defaults:
    _controller: '\Drupal\hello_world\Controller\RegisterVisitorController::registerVisitor'
    _title: 'Registration visitor'
  requirements:
    _permission: 'access content'

hello_world.bespreker_home:
  path: '/bespreker'
  defaults:
    _controller: '\Drupal\hello_world\Controller\BesprekerController::home'
    _title: 'Bespreker Dashboard'
  requirements:
    _permission: 'access content'

hello_world.bespreker_account:
  path: '/bespreker/account'
  defaults:
    _controller: '\Drupal\hello_world\Controller\BesprekerController::account'
    _title: 'Account gegevens'
  requirements:
    _permission: 'access content'

hello_world.bespreker_account_edit:
  path: '/bespreker/account/edit'
  defaults:
    _controller: '\Drupal\hello_world\Controller\BesprekerController::accountEdit'
    _title: 'Account Bewerken'
  requirements:
    _permission: 'access content'

hello_world.bespreker_sessies:
  path: '/bespreker/sessies'
  defaults:
    _controller: '\Drupal\hello_world\Controller\BesprekerController::sessies'
    _title: 'Mijn Sessies'
  requirements:
    _permission: 'access content'

hello_world.bespreker_betalingen:
  path: '/bespreker/betalingen'
  defaults:
    _controller: '\Drupal\hello_world\Controller\BesprekerController::betalingen'
    _title: 'Betalingsgeschiedenis'
  requirements:
    _permission: 'access content'
    
hello_world.bespreker_account_qr:
  path: '/bespreker/account/qr'
  defaults:
    _controller: '\Drupal\hello_world\Controller\BesprekerController::qr'
    _title: 'Mijn QR-code'
  requirements:
    _permission: 'access content'

hello_world.admin_page:
  path: '/hello/admin'
  defaults:
    _controller: '\Drupal\hello_world\Controller\AdminController::page'
    _title: 'Admin Dashboard'
  requirements:
    _permission: 'administer users'
  options:
    _admin_route: TRUE

hello_world.bespreker_feedback:
  path: '/bespreker/feedback'
  defaults:
    _controller: '\Drupal\hello_world\Controller\BesprekerController::feedback'
    _title: 'Feedback Overzicht'
  requirements:
    _permission: 'access content'

hello_world.bespreker_feedback_summary:
  path: '/bespreker/feedback/summary'
  defaults:
    _controller: '\Drupal\hello_world\Controller\BesprekerController::feedbackSummary'
    _title: 'Feedback Analyse'
  requirements:
    _permission: 'access content'

hello_world.bespreker_materialen:
  path: '/bespreker/materialen'
  defaults:
    _controller: '\Drupal\hello_world\Controller\BesprekerController::materialen'
    _title: 'Materialen & Logistiek'
  requirements:
    _permission: 'access content'

hello_world.bespreker_materialen_gehuurd:
  path: '/bespreker/materialen/gehuurd'
  defaults:
    _controller: '\Drupal\hello_world\Controller\BesprekerController::materialenGehuurd'
    _title: 'Gehuurde Materialen'
  requirements:
    _permission: 'access content'

hello_world.bespreker_sessies_details:
  path: '/bespreker/sessies/details'
  defaults:
    _controller: '\Drupal\hello_world\Controller\BesprekerController::sessieDetails'
    _title: 'Sessie Details'
  requirements:
    _permission: 'access content'

hello_world.bespreker_sessies_bezoekers:
  path: '/bespreker/sessies/bezoekers'
  defaults:
    _controller: '\Drupal\hello_world\Controller\BesprekerController::bezoekersDetails'
    _title: 'Bezoekers Lijst'
  requirements:
    _permission: 'access content'