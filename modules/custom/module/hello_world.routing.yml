hello_world.hello:
  path: '/hello'
  defaults:
    _controller: '\Drupal\hello_world\Controller\HelloWorldController::hello'
    _title: 'Hello World'
  requirements:
    _permission: 'access content'

registration_visitor.register:
  path: '/register_visitor'
  defaults:
    _controller: '\Drupal\hello_world\Controller\RegisterVisitorController::registerVisitor'
    _title: 'Registration visitor'
  requirements:
    _permission: 'access content'

hello_world.admin_page:
  path: '/hello/admin'
  defaults:
    _controller: '\Drupal\hello_world\Controller\AdminController::page'
    _title: 'Admin Dashboard'
  requirements:
    _permission: 'administer users'
  options:
    _admin_route: TRUE