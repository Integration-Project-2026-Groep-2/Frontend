hello_world.hello:
  path: '/hello'
  defaults:
    _controller: '\Drupal\hello_world\Controller\HelloWorldController::hello'
    _title: 'Hello World'
  requirements:
    _permission: 'access content'

hello_world.registration_choice:
  path: '/registration-choice'
  defaults:
    _controller: '\Drupal\hello_world\Controller\RegisterPageController::registrationChoice'
    _title: 'Registration Choice'
  requirements:
    _access: 'TRUE'

hello_world.register_visitor:
  path: '/register-visitor'
  defaults:
    _form: '\Drupal\hello_world\Form\RegisterVisitorForm'
    _title: 'Visitor Registration'
  requirements:
    _permission: 'access content'

hello_world.register_company:
  path: '/register-company'
  defaults:
    _form: '\Drupal\hello_world\Form\RegisterCompanyForm'
    _title: 'Company Application'
  requirements:
    _permission: 'access content'

hello_world.admin_page:
  path: '/hello/admin'
  defaults:
    _controller: '\Drupal\hello_world\Controller\AdminController::page'
    _title: 'Admin Dashboard'
  requirements:
    _permission: 'administer users'
  options:
    _admin_route: TRUE