session_management.list:
  path: '/session'
  defaults:
    _controller: '\Drupal\session_management\Controller\SessionManagement::listPages'
    _title: 'Sessions'
  requirements:
    _permission: 'administer users'
  options:
    _admin_route: TRUE

session_management.create:
  path: '/session/create'
  defaults:
    _controller: '\Drupal\session_management\Controller\SessionCreate::createPage'
    _title: 'Create new session'
  requirements:
    _permission: 'administer users'
  options:
    _admin_route: TRUE

session_management.edit:
  path: '/session/edit/{session_id}'
  defaults:
    _controller: '\Drupal\session_management\Controller\SessionEdit::editPage'
    _title: 'Edit session'
  requirements:
    _permission: 'administer users'
  options:
    _admin_route: TRUE