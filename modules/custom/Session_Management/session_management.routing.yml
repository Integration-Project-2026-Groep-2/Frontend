session_management.create:
  path: '/session/create'
  defaults:
    _controller: '\Drupal\session_management\Controller\SessionCreate::content'
    _title: 'Create Session'
  requirements:
    _role: 'administrator'

session_management.list:
  path: '/sessions'
  defaults:
    _controller: '\Drupal\session_management\Controller\SessionManagement::content'
    _title: 'Sessions'
  requirements:
    _role: 'administrator'

session_management.location.list:
  path: '/locations'
  defaults:
    _controller: '\Drupal\session_management\Controller\LocationManagement::content'
    _title: 'Locations'
  requirements:
    _role: 'administrator'

session_management.location.create:
  path: '/location/create'
  defaults:
    _controller: '\Drupal\session_management\Controller\LocationCreate::content'
    _title: 'Create Location'
  requirements:
    _role: 'administrator'

session_management.location.create.modal:
  path: '/location/create/modal'
  defaults:
    _controller: '\Drupal\session_management\Controller\LocationCreate::modal'
    _title: 'Create Location'
  requirements:
    _role: 'administrator'
  options:
    _theme: 'dialog'